<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Neural Trace - Local Files Demo</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #target-design { width: 100vw; height: 100vh; object-fit: contain; position: absolute; z-index: 1; }
        #gaze-pointer {
            position: absolute; width: 25px; height: 25px;
            background: rgba(0, 229, 255, 0.6); border-radius: 50%;
            box-shadow: 0 0 20px #00E5FF; pointer-events: none;
            z-index: 9999; display: none; transform: translate(-50%, -50%);
        }
        /* ビデオの表示位置を左上に固定 */
        #webgazerVideoContainer { z-index: 10000 !important; top: 10px !important; left: 10px !important; }
    </style>
</head>
<body>
    <img id="target-design" src="design.png">
    <div id="gaze-pointer"></div>

    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
<script>
    window.onload = async function() {
        const pointer = document.getElementById('gaze-pointer');

        // ローカルファイルのパス設定
        webgazer.params.staticRoot = './mediapipe/face_mesh/';

        await webgazer.setGazeListener(function(data, elapsedTime) {
            if (data == null) {
                pointer.style.display = 'none';
                return;
            }
            // ポインターを表示して動かす
            pointer.style.display = 'block';
            pointer.style.left = data.x + 'px';
            pointer.style.top = data.y + 'px';
        }).begin();

        // プレビュー機能の有効化
        webgazer.showVideo(true).showFaceOverlay(true).showPredictionPoints(true);

        // --- ✅ 修正完了：最新の学習用命令 ---
        document.addEventListener('mousedown', function(event) {
            // recordClick ではなく recordScreenPosition を使います
            webgazer.recordScreenPosition(event.clientX, event.clientY, 'click');
            console.log("学習ポイントを追加: ", event.clientX, event.clientY);
        });
    };
</script>
</body>
</html>
