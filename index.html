<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Neural Trace - Image Base Demo</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* 背景画像の設定：画面中央にピッタリ配置 */
        #target-design {
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* 画像を画面内に収める */
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        #gaze-pointer {
            position: absolute; width: 25px; height: 25px;
            background: rgba(0, 229, 255, 0.6); border-radius: 50%;
            box-shadow: 0 0 20px #00E5FF; pointer-events: none;
            z-index: 9999; display: none; transform: translate(-50%, -50%);
            transition: all 0.1s ease-out;
        }
        
        #webgazerVideoContainer { z-index: 10000 !important; border-radius: 8px; overflow: hidden; }
        #status-msg { color: #00E5FF; position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 2; font-family: sans-serif; }
    </style>
</head>
<body>

    <img id="target-design" src="design.png">

    <div id="gaze-pointer"></div>
    <div id="status-msg">画面内の要素をクリックしながら、そこをじっと見て調整してください</div>

    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

    <script>
        window.onload = async function() {
            const pointer = document.getElementById('gaze-pointer');

            // 404エラー対策の設定
            webgazer.params.staticRoot = 'https://webgazer.cs.brown.edu/data/';

            await webgazer.setGazeListener(function(data, elapsedTime) {
                if (data == null) return;
                pointer.style.display = 'block';
                pointer.style.left = data.x + 'px';
                pointer.style.top = data.y + 'px';
            }).begin();

            webgazer.showVideo(true).showFaceOverlay(true).showPredictionPoints(true);

            // 画面クリックで学習
            document.addEventListener('mousedown', function(event) {
                webgazer.recordScreenClick(event.clientX, event.clientY);
            });
        };
    </script>
</body>
</html>
