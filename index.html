<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Neural Trace - Final Setup</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #121212; }
        iframe { border: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #gaze-pointer {
            position: absolute; width: 25px; height: 25px;
            background: rgba(0, 229, 255, 0.6); border-radius: 50%;
            box-shadow: 0 0 20px #00E5FF; pointer-events: none;
            z-index: 9999; display: none; transform: translate(-50%, -50%);
        }
        #webgazerVideoContainer { z-index: 10000 !important; }
    </style>
</head>
<body>

    <div id="gaze-pointer"></div>
    <iframe id="figma-iframe" src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/eJxVGSSnMB3L4kTo9oknpB/%E3%82%A2%E3%83%97%E3%83%AA%E5%88%B6%E4%BD%9C%E8%AA%B2%E9%A1%8C?node-id=582-1267&t=aNVs9tgG4hIu91ld-1" allowfullscreen></iframe>

    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

    <script>
        // 1. ページ読み込み時に即座に設定を注入
        window.addEventListener('load', async function() {
            const pointer = document.getElementById('gaze-pointer');

            // --- 🚨 404エラー対策の決定版 🚨 ---
            // 起動前にパラメータを上書きします
            webgazer.params.staticRoot = 'https://webgazer.cs.brown.edu/data/';

            // 2. リスナーと初期設定を済ませてから begin()
            await webgazer.setGazeListener(function(data, elapsedTime) {
                if (data == null) return;
                pointer.style.display = 'block';
                pointer.style.left = data.x + 'px';
                pointer.style.top = data.y + 'px';
            }).begin();

            // 3. 表示設定を適用
            webgazer.showVideo(true)
                    .showFaceOverlay(true)
                    .showPredictionPoints(true);

            // 4. Figma上のクリックを検知して学習させる
            document.addEventListener('click', function(event) {
                webgazer.recordScreenClick(event.clientX, event.clientY);
            });

            console.log("WebGazer is now running with forced static root.");
        });
    </script>
</body>
</html>
